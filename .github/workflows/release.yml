# Build Windows installer and attach to GitHub Releases (no local build required for users).
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release checks
        run: npm run test:release
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          RAYON_NUM_THREADS: "1"

      - name: Build Windows installer
        run: npm run electron:build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          RAYON_NUM_THREADS: "1"

      - name: Smoke test packaged app
        run: powershell -ExecutionPolicy Bypass -File scripts/test-packaged-app.ps1

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/BORS-Setup-*.exe
          generate_release_notes: true

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: BORS-Windows-installer
          path: release/BORS-Setup-*.exe
          retention-days: 30
